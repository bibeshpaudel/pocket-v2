<!-- @dsCard group="Components" viewport="700x360" name="Surfaces" subtitle="ToolCard, Panel (raised/sunken/code), Tabs, EmptyState, Toast" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0;padding:18px 22px;background:var(--surface-app);">
  <div id="root"></div>
  <script type="text/babel">
    const { ToolCard, Panel, Tabs, EmptyState, Toast, Badge, CopyButton, IconButton } = window.PocketDesignSystem_654e67;
    function Card() {
      const [starred, setStarred] = React.useState(true);
      const [tab, setTab] = React.useState("Preview");
      return (
        <div style={{ display: "grid", gridTemplateColumns: "240px 1fr 1fr", gap: 14 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <ToolCard icon="braces" name="JSON Formatter" description="Pretty-print, minify, validate"
              starred={starred} onStar={() => setStarred(!starred)} />
            <ToolCard compact icon="key-round" name="Password Generator" onStar={() => {}} />
            <Tabs items={["Preview", "Source"]} active={tab} onChange={setTab} />
            <Toast kind="ok" style={{ alignSelf: "flex-start" }}>Copied to clipboard</Toast>
          </div>
          <Panel title="Input" variant="sunken" meta="2,148 chars"
            actions={<IconButton icon="x" label="Clear" size="sm" />} style={{ minHeight: 240 }}>
            <div style={{ padding: 14, fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--text-secondary)" }}>
              {"{ \"name\": \"pocket\", \"tools\": 35 }"}
            </div>
          </Panel>
          <Panel title="Output" variant="code" meta={<Badge kind="ok" dot>Valid</Badge>}
            actions={<CopyButton onDark text="ok" />} style={{ minHeight: 240 }}>
            <pre style={{ margin: 0, padding: 14, fontFamily: "var(--font-mono)", fontSize: 13, lineHeight: 1.6 }}>
              <span style={{ color: "var(--syn-punct)" }}>{"{"}</span>{"\n  "}
              <span style={{ color: "var(--syn-key)" }}>"name"</span>
              <span style={{ color: "var(--syn-punct)" }}>:</span>{" "}
              <span style={{ color: "var(--syn-string)" }}>"pocket"</span>
              <span style={{ color: "var(--syn-punct)" }}>,</span>{"\n  "}
              <span style={{ color: "var(--syn-key)" }}>"tools"</span>
              <span style={{ color: "var(--syn-punct)" }}>:</span>{" "}
              <span style={{ color: "var(--syn-number)" }}>35</span>{"\n"}
              <span style={{ color: "var(--syn-punct)" }}>{"}"}</span>
            </pre>
          </Panel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
  </script>
</body>
</html>
