<!-- @dsCard group="Components" viewport="700x300" name="Forms" subtitle="Input, Textarea, Select, Switch, SegmentedControl" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0;padding:18px 22px;background:var(--surface-app);">
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Textarea, Select, Switch, SegmentedControl } = window.PocketDesignSystem_654e67;
    function Card() {
      const [mode, setMode] = React.useState("Encode");
      const [algo, setAlgo] = React.useState("SHA-256");
      const [on, setOn] = React.useState(true);
      const [lang, setLang] = React.useState("py");
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Input label="Secret key" mono placeholder="Paste your key" hint="Never leaves your browser" />
            <Input mono error="Not a valid URL" defaultValue="htp:/pocket" />
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <Select options={[{ value: "py", label: "Python 3" }, { value: "js", label: "JavaScript" }, { value: "cpp", label: "C++" }]} value={lang} onChange={(e) => setLang(e.target.value)} />
              <Switch checked={on} onChange={setOn} label="Sort keys" />
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Textarea placeholder="Paste JSON here…" rows={4} />
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <SegmentedControl options={["Encode", "Decode"]} value={mode} onChange={setMode} />
              <SegmentedControl mono options={["MD5", "SHA-1", "SHA-256"]} value={algo} onChange={setAlgo} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
  </script>
</body>
</html>
