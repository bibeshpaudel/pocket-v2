<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="6 / 10 / 14 / 20 — kbd → controls → cards → overlays" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:18px 22px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
    <div style="height:72px;border-radius:var(--radius-sm);background:var(--surface-raised);border:1px solid var(--border-strong);"></div>
    <div style="height:72px;border-radius:var(--radius-md);background:var(--surface-raised);border:1px solid var(--border-strong);"></div>
    <div style="height:72px;border-radius:var(--radius-lg);background:var(--surface-raised);border:1px solid var(--border-strong);"></div>
    <div style="height:72px;border-radius:var(--radius-xl);background:var(--surface-raised);border:1px solid var(--border-strong);"></div>
    <div style="height:72px;border-radius:var(--radius-full);background:var(--surface-raised);border:1px solid var(--border-strong);"></div>
    <code style="font-size:10px;color:var(--text-secondary);">sm 6<br><span style="color:var(--text-tertiary)">kbd, tags</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">md 10<br><span style="color:var(--text-tertiary)">buttons, inputs</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">lg 14<br><span style="color:var(--text-tertiary)">cards, panes</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">xl 20<br><span style="color:var(--text-tertiary)">palette, dialogs</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">full<br><span style="color:var(--text-tertiary)">pills, switch</span></code>
  </div>
</body>
</html>
