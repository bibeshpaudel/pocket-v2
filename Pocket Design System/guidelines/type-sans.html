<!-- @dsCard group="Type" viewport="700x180" name="Instrument Sans — UI face" subtitle="Google Fonts substitute; warm compact grotesque for all UI text" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px 22px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="font-size:34px;font-weight:600;letter-spacing:var(--tracking-tight);line-height:1.15;">What do you need?</div>
  <div style="margin-top:8px;font-size:15px;color:var(--text-secondary);">Paste, drop, or pick a tool — everything runs in your browser.</div>
  <div style="margin-top:16px;display:flex;gap:22px;font-size:14px;align-items:baseline;">
    <span style="font-weight:400;">Regular 400</span>
    <span style="font-weight:500;">Medium 500</span>
    <span style="font-weight:600;">Semibold 600</span>
    <span style="font-weight:700;">Bold 700</span>
    <span style="font-style:italic;color:var(--text-secondary);">Italic</span>
    <code style="font-size:11px;color:var(--text-tertiary);">--font-sans</code>
  </div>
</body>
</html>
