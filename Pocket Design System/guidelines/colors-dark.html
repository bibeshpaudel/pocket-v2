<!-- @dsCard group="Colors" viewport="700x170" name="Dark theme" subtitle="Opt-in via <html data-theme=&quot;dark&quot;> — same tokens, remapped" -->
<!DOCTYPE html>
<html data-theme="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:18px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="display:flex;gap:12px;align-items:stretch;">
    <div style="flex:1.2;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:14px 16px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;">Formatters</div>
      <div style="font-size:15px;font-weight:600;color:var(--text-primary);">JSON Formatter</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">Pretty-print, minify, validate</div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <span style="background:var(--accent);color:var(--text-on-accent);font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--radius-md);">Format</span>
        <span style="background:var(--surface-hover);color:var(--text-secondary);font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--radius-md);border:1px solid var(--border-default);">Copy</span>
      </div>
    </div>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div style="border-radius:var(--radius-md);background:var(--surface-app);border:1px solid var(--border-default);"></div>
      <div style="border-radius:var(--radius-md);background:var(--surface-raised);border:1px solid var(--border-default);"></div>
      <div style="border-radius:var(--radius-md);background:var(--surface-sunken);border:1px solid var(--border-default);"></div>
      <div style="border-radius:var(--radius-md);background:var(--accent-soft);"></div>
    </div>
  </div>
</body>
</html>
