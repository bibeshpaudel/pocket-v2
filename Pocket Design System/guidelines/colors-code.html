<!-- @dsCard group="Colors" viewport="700x190" name="Code pane + syntax" subtitle="Output panes are always dark warm charcoal — in both themes" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:18px;background:var(--surface-app);">
  <div style="display:flex;gap:14px;align-items:stretch;">
    <pre style="flex:1.4;margin:0;background:var(--code-bg);border-radius:var(--radius-lg);padding:14px 18px;font-family:var(--font-mono);font-size:12.5px;line-height:var(--leading-code);color:var(--code-fg);overflow:hidden;"><span style="color:var(--syn-punct)">{</span>
  <span style="color:var(--syn-key)">"name"</span><span style="color:var(--syn-punct)">:</span> <span style="color:var(--syn-string)">"pocket"</span><span style="color:var(--syn-punct)">,</span>
  <span style="color:var(--syn-key)">"tools"</span><span style="color:var(--syn-punct)">:</span> <span style="color:var(--syn-number)">35</span><span style="color:var(--syn-punct)">,</span>
  <span style="color:var(--syn-key)">"client_side"</span><span style="color:var(--syn-punct)">:</span> <span style="color:var(--syn-keyword)">true</span> <span style="color:var(--syn-comment)">// always</span>
<span style="color:var(--syn-punct)">}</span></pre>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start;">
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--syn-key);"></span><code style="font-size:10px;color:var(--text-secondary);">--syn-key</code></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--syn-string);"></span><code style="font-size:10px;color:var(--text-secondary);">--syn-string</code></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--syn-number);"></span><code style="font-size:10px;color:var(--text-secondary);">--syn-number</code></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--syn-keyword);"></span><code style="font-size:10px;color:var(--text-secondary);">--syn-keyword</code></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--syn-comment);"></span><code style="font-size:10px;color:var(--text-secondary);">--syn-comment</code></div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:var(--code-bg);border:1px solid var(--border-default);"></span><code style="font-size:10px;color:var(--text-secondary);">--code-bg</code></div>
    </div>
  </div>
</body>
</html>
