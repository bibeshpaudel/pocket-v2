<!-- @dsCard group="Type" viewport="700x140" name="Labels & shortcuts" subtitle="Uppercase category labels; kbd capsules for keyboard-first UI" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px 22px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-size:12px;font-weight:600;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);">Generators</span>
      <span style="font-size:12px;font-weight:600;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);">Recently used</span>
    </div>
    <div style="width:1px;height:48px;background:var(--border-default);"></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:13px;color:var(--text-secondary);">Open palette</span>
      <span style="display:inline-flex;gap:4px;">
        <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">⌘</kbd>
        <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">K</kbd>
      </span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:13px;color:var(--text-secondary);">Run</span>
      <span style="display:inline-flex;gap:4px;">
        <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">⌘</kbd>
        <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">⏎</kbd>
      </span>
    </div>
  </div>
</body>
</html>
