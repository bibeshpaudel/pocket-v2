<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Warm-tinted ink, used sparingly — borders do the separation work" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:24px 22px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">
    <div style="height:74px;border-radius:var(--radius-lg);background:var(--surface-raised);border:1px solid var(--border-default);box-shadow:var(--shadow-1);"></div>
    <div style="height:74px;border-radius:var(--radius-lg);background:var(--surface-raised);border:1px solid var(--border-default);box-shadow:var(--shadow-2);"></div>
    <div style="height:74px;border-radius:var(--radius-lg);background:var(--surface-raised);box-shadow:var(--shadow-3);"></div>
    <code style="font-size:10px;color:var(--text-secondary);">--shadow-1<br><span style="color:var(--text-tertiary)">card hover lift</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">--shadow-2<br><span style="color:var(--text-tertiary)">dropdowns, popovers</span></code>
    <code style="font-size:10px;color:var(--text-secondary);">--shadow-3<br><span style="color:var(--text-tertiary)">command palette, dialogs</span></code>
  </div>
</body>
</html>
