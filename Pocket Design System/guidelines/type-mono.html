<!-- @dsCard group="Type" viewport="700x170" name="JetBrains Mono — code face" subtitle="Anything copyable renders in mono: code, values, hashes, shortcuts" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px 22px;background:var(--surface-app);font-family:var(--font-mono);">
  <div style="font-size:17px;color:var(--text-primary);">a1b2c3d4-e5f6-4789-abcd-0123456789ef</div>
  <div style="margin-top:8px;font-size:13px;color:var(--text-secondary);">SHA-256 · 2,148 chars · line 14, col 3 · 0123456789 Il1 O0</div>
  <div style="margin-top:16px;display:flex;gap:20px;font-size:13px;align-items:center;">
    <span style="font-weight:400;">Regular</span>
    <span style="font-weight:500;">Medium</span>
    <span style="font-weight:700;">Bold</span>
    <span style="display:inline-flex;gap:4px;">
      <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">⌘</kbd>
      <kbd style="font-size:11px;background:var(--surface-sunken);border:1px solid var(--border-default);border-bottom-width:2px;border-radius:6px;padding:2px 7px;">K</kbd>
    </span>
    <code style="font-size:11px;color:var(--text-tertiary);">--font-mono</code>
  </div>
</body>
</html>
