<!-- @dsCard group="Colors" viewport="700x160" name="Surface levels" subtitle="Hierarchy via three paper levels + 1px borders, not shadows" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:18px;background:var(--surface-app);font-family:var(--font-sans);">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
    <div style="height:78px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--surface-app);"></div>
    <div style="height:78px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--surface-raised);"></div>
    <div style="height:78px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--surface-sunken);"></div>
    <div style="height:78px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--surface-hover);"></div>
    <div style="height:78px;border-radius:var(--radius-md);background:var(--surface-inverse);"></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">--surface-app<br><span style="color:var(--text-tertiary)">page</span></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">--surface-raised<br><span style="color:var(--text-tertiary)">cards</span></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">--surface-sunken<br><span style="color:var(--text-tertiary)">inputs, wells</span></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">--surface-hover<br><span style="color:var(--text-tertiary)">hover step</span></div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">--surface-inverse<br><span style="color:var(--text-tertiary)">tooltips</span></div>
  </div>
</body>
</html>
